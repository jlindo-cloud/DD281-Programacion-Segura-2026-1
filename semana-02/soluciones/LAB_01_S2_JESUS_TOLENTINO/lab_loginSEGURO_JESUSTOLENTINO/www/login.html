<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Seguro - DD281</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: #1a1a2e; color: #e2e8f0; font-family: "Segoe UI", sans-serif; }
    main { width: min(390px, 92vw); padding: 38px; border: 1px solid #0f3460;
      border-radius: 12px; background: #16213e; box-shadow: 0 20px 60px #0008; }
    h1 { margin: 0 0 6px; color: #e94560; text-align: center; }
    .subtitle { margin: 0 0 24px; color: #9aa5b7; text-align: center; }
    .warning { margin-bottom: 20px; padding: 10px; border: 1px solid #b7791f;
      border-radius: 6px; background: #744210; color: #fefcbf; text-align: center; }
    label { display: block; margin: 14px 0 6px; color: #b8c2d3; }
    input { width: 100%; padding: 12px; border: 1px solid #1a4a7a;
      border-radius: 6px; background: #0f3460; color: white; font-size: 1rem; }
    input:focus { outline: 2px solid #e94560; }
    button { width: 100%; margin-top: 22px; padding: 13px; border: 0;
      border-radius: 6px; background: #e94560; color: white; font-weight: 700; }
    .secure { margin-top: 18px; color: #48bb78; text-align: center; }
  </style>
</head>
<body>
  <main>
    <h1>Portal Seguro</h1>
    <p class="subtitle">Programación Segura - DD281</p>
    <div class="warning">Certificado autofirmado - Solo para laboratorio</div>
    <form method="post" action="/cgi-bin/login_seguro.py">
      <label for="usuario">Usuario</label>
      <input id="usuario" name="usuario" type="text" required maxlength="50"
             autocomplete="username" placeholder="tu.usuario">
      <label for="password">Contraseña</label>
      <input id="password" name="password" type="password" required maxlength="128"
             autocomplete="current-password" placeholder="••••••••">
      <button type="submit">Iniciar sesión</button>
    </form>
    <div class="secure">Conexión cifrada con TLS</div>
  </main>
</body>
</html>
